name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 85.239.57.126
          username: axecode_tech_usr
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/var/www/axecode_tech_usr/data/www/landing-ad.axecode.tech"
            BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
            cd "$APP_DIR"
            bash script_ai/deploy_server.sh "$BRANCH"
